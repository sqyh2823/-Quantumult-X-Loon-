[Remote Filter]
HK_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
TW_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
JP_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
KR_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
SG_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
US_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"

[Proxy Group]
# 自动测速组 (基于正则筛选)
HK_Auto = select, HK_Nodes
TW_Auto = url-test, TW_Nodes, interval=60, tolerance=50
JP_Auto = url-test, JP_Nodes, interval=60, tolerance=50
KR_Auto = url-test, KR_Nodes, interval=60, tolerance=50
SG_Auto = url-test, SG_Nodes, interval=60, tolerance=50
US_Auto = url-test, US_Nodes, interval=60, tolerance=50

# 兜底后备
Fallback = fallback, LiangXin, PaoPao, interval=60, max-timeout=2000

# 核心策略组 (满足你的分流需求)
Proxy = select, HK_Auto, TW_Auto, JP_Auto, SG_Auto, US_Auto, KR_Auto, Fallback
AI = select, US_Auto, TW_Auto, JP_Auto, SG_Auto, KR_Auto
YouTube = select, HK_Auto, TW_Auto, JP_Auto, SG_Auto, US_Auto, KR_Auto
TikTok = select, TW_Auto, JP_Auto, SG_Auto, US_Auto, KR_Auto
Domestic = select, DIRECT, Proxy
Final = select, Proxy, DIRECT

