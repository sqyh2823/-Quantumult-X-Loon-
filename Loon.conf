[General]
# --- 通用设置 ---
ipv6 = false
# 资源解析器，用于转换各种订阅格式
resource-parser = https://raw.githubusercontent.com/Loon0x00/LoonExampleConfig/master/Parser/Loon.lua
# 测速地址
test-timeout = 3
internet-test-url = http://www.gstatic.com/generate_204
# 允许 Wi-Fi 访问
allow-wifi-access = false
wifi-access-http-port = 7222
wifi-access-socks5-port = 7223

[DNS]
# --- DNS 优化 ---
# 开启 DNS 预解析
predict-all-untrusted-dns-test = true
enable-dns-server-selection = true
# 国内 DNS (阿里 & 腾讯)
server = 223.5.5.5
server = 119.29.29.29
# 国外 DNS (Google & Cloudflare)
server = 8.8.8.8
server = 1.1.1.1

[Proxy]
# 节点导入区域 (手动添加或通过订阅管理导入)

[Proxy Group]
# --- 策略组设置 ---

# 1. 最终兜底流量 (Global)
Final = select, Proxy, DIRECT

# 2. 代理汇总 (Proxy)
Proxy = select, Auto, 节点A, 节点B

# 3. 自动选择 (Auto)
Auto = url-test, 节点A, 节点B, url = http://www.gstatic.com/generate_204, interval = 600

# 4. 人工智能 (AI - ChatGPT/Gemini/Claude)
AI = select, Proxy, Auto, 节点A

# 5. YouTube (包含去广告插件支持)
YouTube = select, Proxy, Auto

# 6. TikTok (需要配合换区插件)
TikTok = select, Proxy, 节点A

# 7. 国内媒体与社交 (微信/抖音/Bilibili)
Domestic = select, DIRECT, Proxy

[Remote Rule]
# --- 远程规则集 (分流逻辑) ---

# A. 拦截规则 (Ads)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Advertising/Advertising.list, policy=REJECT, tag=广告拦截, enabled=true

# B. AI 规则
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/OpenAI/OpenAI.list, policy=AI, tag=ChatGPT, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Gemini/Gemini.list, policy=AI, tag=Gemini, enabled=true

# C. YouTube 规则
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/YouTube/YouTube.list, policy=YouTube, tag=YouTube, enabled=true

# D. TikTok 规则
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/TikTok/TikTok.list, policy=TikTok, tag=TikTok, enabled=true

# E. 微信规则 (强制直连防止收消息延迟)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/WeChat/WeChat.list, policy=DIRECT, tag=微信, enabled=true

# F. 抖音规则
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Douyin/Douyin.list, policy=Domestic, tag=抖音, enabled=true

# G. 全球加速 (国外常用)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global.list, policy=Proxy, tag=全球加速, enabled=true

# H. 中国直连 (国内常用 IP/域名)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China.list, policy=DIRECT, tag=中国直连, enabled=true
GEOIP, CN, DIRECT

[Remote Plugin]
# --- 强力插件 (去广告与换区核心) ---

# 1. 综合去广告 (包含大部分 App 开屏广告拦截)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/Loon/Advertising/Advertising.plugin, tag=全能去广告, enabled=true

# 2. YouTube 去广告插件 (屏蔽视频中插广告)
https://raw.githubusercontent.com/Maasea/sgmodule/master/Loon/YouTube.plugin, tag=YouTube去广告, enabled=true

# 3. TikTok 换区插件 (默认美国，可手动在插件设置里修改)
https://raw.githubusercontent.com/Semporia/TikTok-Unlock/master/Loon/TikTok_Unlock_All_Region.plugin, tag=TikTok换区, enabled=true

[Rule]
# 本地补充规则
FINAL, Final

[MITM]
enable = true
# 建议通过 Loon 的证书生成器自动更新主机名
hostname = *.googlevideo.com, *.byteoversea.com, *.pstatp.com, *.snssdk.com, *.amap.com
