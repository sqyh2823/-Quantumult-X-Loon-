[Remote Filter]
# 全自动正则筛选
HK_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
TW_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
JP_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
KR_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
SG_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
US_Nodes = NameRegex, FilterKey = "^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣好塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"

[Proxy Group]
# 1. 自建节点管理组
自建节点 = select, 自建日本2_Hy2, RN美西-CF优选, DIRECT

# 2. 机场地区自动测速组
香港自动节点 = url-test, HK_Nodes, interval=60, tolerance=50
台湾自动节点 = url-test, TW_Nodes, interval=60, tolerance=50
日本自动节点 = url-test, JP_Nodes, interval=60, tolerance=50
韩国自动节点 = url-test, KR_Nodes, interval=60, tolerance=50
新国自动节点 = url-test, SG_Nodes, interval=60, tolerance=50
美国自动节点 = url-test, US_Nodes, interval=60, tolerance=50

# 核心分流策略组
节点选择 = select, 自建节点, 香港自动节点, 台湾自动节点, 日本自动节点, 新国自动节点, 美国自动节点, 韩国自动节点
