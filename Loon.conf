[General]
ipv6 = false
resource-parser = https://raw.githubusercontent.com/Loon0x00/LoonExampleConfig/master/Parser/Loon.lua
test-timeout = 3
internet-test-url = http://www.gstatic.com/generate_204
allow-wifi-access = false
wifi-access-http-port = 7222
wifi-access-socks5-port = 7223

[DNS]
predict-all-untrusted-dns-test = true
enable-dns-server-selection = true
# 国内 DNS
server = 223.5.5.5
server = 119.29.29.29
# 国外 DNS
server = 8.8.8.8
server = 1.1.1.1

[Proxy]
# 此处建议在 Loon App 内直接通过“订阅管理”导入，不需要手动在这里写节点

[Proxy Group]
# 1. 最终兜底
Final = select, Proxy, DIRECT
# 2. 代理汇总 (请确保你导入的订阅节点在 Proxy 组中，或者修改为你的订阅名)
Proxy = select, Auto, DIRECT
# 3. 自动测速
Auto = url-test, Proxy, url=http://www.gstatic.com/generate_204, interval=600
# 4. 人工智能
AI = select, Proxy, Auto
# 5. YouTube (去广告专用)
YouTube = select, Proxy, Auto
# 6. TikTok (换区专用)
TikTok = select, Proxy
# 7. 国内媒体
Domestic = select, DIRECT, Proxy

[Remote Rule]
# 远程规则必须以 remote-rule = 开头
remote-rule = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Advertising/Advertising.list, policy=REJECT, tag=广告拦截, enabled=true
remote-rule = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/OpenAI/OpenAI.list, policy=AI, tag=ChatGPT, enabled=true
remote-rule = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/YouTube/YouTube.list, policy=YouTube, tag=YouTube, enabled=true
remote-rule = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/TikTok/TikTok.list, policy=TikTok, tag=TikTok, enabled=true
remote-rule = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/WeChat/WeChat.list, policy=DIRECT, tag=微信, enabled=true
remote-rule = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global.list, policy=Proxy, tag=全球加速, enabled=true
remote-rule = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China.list, policy=DIRECT, tag=中国直连, enabled=true

[Remote Plugin]
# 远程插件必须以 plugin = 开头
plugin = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/Loon/Advertising/Advertising.plugin, tag=全能去广告, enabled=true
plugin = https://raw.githubusercontent.com/Maasea/sgmodule/master/Loon/YouTube.plugin, tag=YouTube去广告, enabled=true
plugin = https://raw.githubusercontent.com/Semporia/TikTok-Unlock/master/Loon/TikTok_Unlock_All_Region.plugin, tag=TikTok换区, enabled=true

[Rule]
# 本地规则与 GEOIP 归类在此
GEOIP, CN, DIRECT
FINAL, Final

[MITM]
enable = true
hostname = *.googlevideo.com, *.byteoversea.com, *.pstatp.com, *.snssdk.com, *.amap.com
