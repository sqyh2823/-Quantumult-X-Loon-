mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false # Clash 层面关闭 IPv6 处理，配合路由器关闭 IPv6 效果达到完全体

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false # 🔒 严格禁止 DNS 层面解析 AAAA (IPv6) 记录
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:1053 # 显式监听本地 DNS 端口
  respect-rules: true

  # 🚀 拦截传统 DNS 偷跑
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alicdn.com/dns-query

  # 🛠️ 针对电视端报错的核心修复点：当 respect-rules 开启时，此项绝对不能为空
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 🔒 仅保留大方向的中国大陆 IP/域名不走 Fake-IP
  fake-ip-filter:
    - "geoip:cn"
    - "geosite:cn"

  nameserver-policy:
    '+.06231104.xyz':
      - 223.5.5.5
      - 119.29.29.29
    '+.top':
      - 223.5.5.5
      - 119.29.29.29
    '+.cn':
      - 223.5.5.5
      - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

