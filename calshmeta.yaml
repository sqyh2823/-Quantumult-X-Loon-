mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true # 🛠️ 核心修改：开启全局 IPv6 支持，允许内核向 IPv6 节点发起连接

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false # 🔒 严谨保留：防止电视端 App 获取 AAAA 记录导致分流错乱或卡顿
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alicdn.com/dns-query

  # 🛠️ 针对电视端报错的核心修复点：当 respect-rules 开启时，此项绝对不能为空
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 🔒 核心修复：防止国内主流 App 因 Fake-IP 导致判定为 VPN 代理而报错
  fake-ip-filter:
    - "geoip:cn"
    - "geosite:cn"
    - "+.qq.com"
    - "+.qqlive.com"
    - "+.video.qq.com"

  nameserver-policy:
    '+.06231104.xyz':
      - 223.5.5.5
      - 119.29.29.29
    '+.top':
      - 223.5.5.5
      - 119.29.29.29
    '+.cn':
      - 223.5.5.5
      - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ==================== 节点 ====================
proxies:

  # --- 日本直连 Hy2 (IPv6) ---
  - name: "🏠 自建 绿云日本 (Hy2)"
    type: hysteria2
    server: "2403:71c0:2000:13f2::a" # 🛠️ 核心修改：已更新为您的最新 IPv6 地址
    port: 22223
    password: qr0801
    sni: www.microsoft.com
    alpn:
      - h3
    client-fingerprint: chrome
    skip-cert-verify: true
    fast-open: false # 保持关闭以确保电视端内核兼容性
    up: "50 Mbps"
    down: "900 Mbps"

  # --- RN 美西 优选 ---
  - name: "🏠 自建 RN美西-CF优选"
    type: vless
    server: sqyh.06231104.xyz
    port: 443
    uuid: 2ed31204-f8b5-45e0-86b7-d913a2eff3e8
    udp: true
    tls: true
    servername: node.06231104.xyz
    client-fingerprint: chrome
    skip-cert-verify: true
    network: ws
    ws-opts:
      path: /raycd
      headers:
        Host: node.06231104.xyz

# ==================== 策略组 ====================
proxy-groups:

  - name: "🚀 自动选择"
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true
    timeout: 3000
    proxies:
      - "🏠 自建 绿云日本 (Hy2)"
      - "🏠 自建 RN美西-CF优选"

  - name: "🎥 奈飞分流"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🏠 自建 RN美西-CF优选"
      - "🏠 自建 绿云日本 (Hy2)"

  - name: "🏰 迪士尼分流"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🏠 自建 RN美西-CF优选"
      - "🏠 自建 绿云日本 (Hy2)"

# ==================== 规则 ====================
rules:

  # 📺 国内电视 App 强直连（置顶防止被 Fake-IP 误伤）
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,qqlive.com,DIRECT
  - DOMAIN-SUFFIX,video.qq.com,DIRECT

  # Netflix
  - DOMAIN-KEYWORD,netflix,🎥 奈飞分流
  - DOMAIN-SUFFIX,netflix.com,🎥 奈飞分流
  - DOMAIN-SUFFIX,netflix.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxext.com,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxso.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflximg.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxvideo.net,🎥 奈飞分流

  # Disney+
  - DOMAIN-SUFFIX,disneyplus.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disney-plus.net,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disneystreaming.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,dssott.com,🏰 迪士尼分流

  # YouTube
  - DOMAIN-SUFFIX,googlevideo.com,🚀 自动选择
  - DOMAIN-SUFFIX,youtube.com,🚀 自动选择
  - DOMAIN-SUFFIX,ytimg.com,🚀 自动选择

  # AI
  - DOMAIN-SUFFIX,openai.com,🚀 自动选择
  - DOMAIN-SUFFIX,chatgpt.com,🚀 自动选择
  - DOMAIN-SUFFIX,anthropic.com,🚀 自动选择

  # 国内直连
  - GEOIP,CN,DIRECT

  # 默认
  - MATCH,🚀 自动选择
