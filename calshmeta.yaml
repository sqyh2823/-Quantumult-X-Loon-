mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false

# ==================== 1. DNS 模块（彻底隔离，同时放行自建域名） ====================
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # 嗅探机制：强行抓取奈飞等流媒体的真实底层加密请求
  sniffer:
    enable: true
    sniff:
      - TLS
      - HTTP
    force-domain:
      - '+.netflix.com'
      - '+.nflxvideo.net'
      
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alicdn.com/dns-query # 仅用于国内基础域名秒级解析
    
  # === 💡 核心修复：精准特赦令！放行你的自建优选域名，日本节点瞬间复活 ===
  nameserver-policy:
    '++.06231104.xyz': [223.5.5.5, 119.29.29.29] # 日本 CF 优选域名走国内直解
    '++.top': [223.5.5.5, 119.29.29.29]          # 你的其它 top 自建域名
    '++.cn': [223.5.5.5, 119.29.29.29]           # 放行 cn 域名加速
    
  fallback:
    - https://dns.google/dns-query     # 强制国外流媒体走加密通道，杜绝污染
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ==================== 2. 节点配置（修正发包，规避硬件冲突） ====================
proxies:
  # --- 节点 1: 美国 9929 优质线路 (VLESS REALITY) ---
  - name: "🏠 自建 美国9929 (VLESS)"
    type: vless
    server: 38.244.47.207
    port: 22221
    uuid: 3a09ea5b-6ae9-4cf1-9d56-b33b1623409d
    network: tcp
    tls: true
    udp: true
    servername: www.microsoft.com
    client-fingerprint: chrome
    reality-opts:
      public-key: 9r9p18UpE-VErIqaECVKRLufjim0RCBfFVk0XUwCkSA
      short-id: "88888888"

  # --- 节点 2: RN美西直连节点 (Hysteria 2 协议) ---
  - name: "🏠 自建 RN美西 (Hy2)"
    type: hysteria2
    server: 23.94.122.244
    port: 22222
    password: "qt0801"
    sni: www.microsoft.com
    alpn: [h3]
    skip-cert-verify: true
    fast-open: true
    client-fingerprint: chrome
    # === 已调整：下调 Brutal 拥塞发包率，150M 既满足大带宽，又防止把电视网卡喂吐 ===
    up: "40 Mbps"
    down: "150 Mbps"
    mtu: 1250

  # --- 节点 3: 日本 IIJ 套 CF 优选 (VLESS WS) ---
  - name: "🇯🇵 IIJ Japan"
    type: vless
    server: sqyh.06231104.xyz
    port: 443
    uuid: b6e606be-0c29-4b9a-be98-12869749935b
    udp: true
    tls: true
    network: ws
    sni: node.06231104.xyz
    ws-opts:
      path: "/raycdn"
      headers:
        Host: node.06231104.xyz
    up: "50 Mbps"
    down: "900 Mbps"

# ==================== 3. 策略组 ====================
proxy-groups:
  - name: "🚀 自动选择"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 50
    proxies:
      - "🏠 自建 美国 9929 (VLESS)"
      - "🏠 自建 RN美西 (Hy2)"
      - "🇯🇵 IIJ Japan"

  - name: "🎥 奈飞分流"
    type: select
    proxies:
      - "🏠 自建 美国9929 (VLESS)"   # 排查自建节点时，请在电视上强行手动勾选这一个
      - "🏠 自建 RN美西 (Hy2)"       # 或者勾选这一个
      - "🇯🇵 IIJ Japan"               # 日本 CF 兜底线
      - "🚀 自动选择"

  - name: "🏰 迪士尼分流"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🏠 自建 美国9929 (VLESS)"
      - "🏠 自建 RN美西 (Hy2)"
      - "🇯🇵 IIJ Japan"

# ==================== 4. 规则精细化（双防线，封杀 25% 和 90%） ====================
rules:
  # 第一道防线：域名和关键字拦截，强制收拢奈飞全家桶
  - DOMAIN-KEYWORD,netflix,🎥 奈飞分流
  - DOMAIN-SUFFIX,netflix.com,🎥 奈飞分流
  - DOMAIN-SUFFIX,netflix.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxext.com,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxso.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflximg.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxvideo.net,🎥 奈飞分流

  # 第二道防线：绝杀 90% 断流。只要目标 IP 属于奈飞的官方大 IP 段，一律强行代理
  - GEOIP,netflix,🎥 奈飞分流

  # --- 迪士尼+ 分流 ---
  - DOMAIN-SUFFIX,disneyplus.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disney-plus.net,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disneystreaming.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disney.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,dssott.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disneymusic.com,🏰 迪士尼分流

  # --- YouTube 分流 ---
  - DOMAIN-SUFFIX,googlevideo.com,🚀 自动选择
  - DOMAIN-SUFFIX,youtube.com,🚀 自动选择
  - DOMAIN-KEYWORD,youtube,🚀 自动选择
  - DOMAIN-SUFFIX,ytimg.com,🚀 自动选择
  
  # --- 其它基础规则 ---
  - DOMAIN-SUFFIX,google.com,🚀 自动选择
  - GEOIP,CN,DIRECT
  - MATCH,🚀 自动选择
