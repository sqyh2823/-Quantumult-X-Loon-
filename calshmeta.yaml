# ==================== 策略组 ====================
proxy-groups:

  - name: "🚀 自动选择"
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true
    timeout: 3000
    proxies:
      - "🏠 自建 绿云SB- Hy2"
      - "🏠 自建 绿云日本-CF优选 (VLESS)"
      - "🏠 自建 RN美西-CF优选"

  - name: "🎥 奈飞分流"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🏠 自建 绿云SB- Hy2"
      - "🏠 自建 绿云日本-CF优选 (VLESS)"
      - "🏠 自建 RN美西-CF优选"

  - name: "🏰 迪士尼分流"
