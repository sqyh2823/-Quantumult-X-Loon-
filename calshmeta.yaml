mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true # 保持开启全局 IPv6 支持

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false # 🔒 严谨保留：防止电视端 App 获取 AAAA 记录导致分流错乱或卡顿
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alicdn.com/dns-query

  # 🛠️ 针对电视端报错的核心修复点：当 respect-rules 开启时，此项绝对不能为空
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 🔒 核心修复：防止国内主流电视 App 因 Fake-IP 虚拟 IP 污染导致判定为 VPN 代理而报错/卡顿
  fake-ip-filter:
    - "geoip:cn"
    - "geosite:cn"
    # 腾讯视频 / 云视听极光
    - "+.qq.com"
    - "+.qqlive.com"
    - "+.video.qq.com"
    # 爱奇艺 / 银河奇异果
    - "+.iqiyi.com"
    - "+.qiyi.com"
    - "+.71.am"
    # 优酷 / 酷喵
    - "+.youku.com"
    - "+.ykimg.com"
    # Bilibili / 云视听小电视
    - "+.bilibili.com"
    - "+.hdslb.com"

  nameserver-policy:
    '+.06231104.xyz':
      - 223.5.5.5
      - 119.29.29.29
    '+.top':
      - 223.5.5.5
      - 119.29.29.29
    '+.cn':
      - 223.5.5.5
      - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ==================== 节点 ====================
