mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false # 完全关闭 IPv6 环境

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false 
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:1053 
  respect-rules: true

  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alicdn.com/dns-query

  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fake-ip-filter:
    - "geoip:cn"
    - "geosite:cn"

  nameserver-policy:
    '+.06231104.xyz':
      - 223.5.5.5
      - 119.29.29.29
    '+.top':
      - 223.5.5.5
      - 119.29.29.29
    '+.cn':
      - 223.5.5.5
      - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

