mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alicdn.com/dns-query

  nameserver-policy:
    '+.06231104.xyz':
      - 223.5.5.5
      - 119.29.29.29
    '+.top':
      - 223.5.5.5
      - 119.29.29.29
    '+.cn':
      - 223.5.5.5
      - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ==================== 节点 ====================
proxies:

  # --- 日本直连 Hy2 ---
  - name: "🏠 自建 绿云日本 (Hy2)"
    type: hysteria2
    server: 109.107.140.122
    port: 22223
    password: qr0801
    sni: www.microsoft.com
    alpn:
      - h3
    client-fingerprint: chrome
    skip-cert-verify: true
    fast-open: true
    up: "50 Mbps"
    down: "900 Mbps"

  # --- 日本 CF 优选 ---
  - name: "🏠 自建 绿云日本-CF优选"
    type: vless
    server: sqyh.06231104.xyz
    port: 443
    uuid: 707e268b-c01e-4b9a-bfef-36bcfab127f0
    udp: true
    tls: true
    servername: lyjp.06231104.xyz
    client-fingerprint: chrome
    skip-cert-verify: true

    network: ws
    ws-opts:
      path: /raycf
      headers:
        Host: lyjp.06231104.xyz

  # --- RN 美西 Hy2 ---
  - name: "🏠 自建 RN美西 (Hy2)"
    type: hysteria2
    server: 23.94.122.244
    port: 22222
    password: qt0801
    sni: www.microsoft.com
    alpn:
      - h3
    client-fingerprint: chrome
    skip-cert-verify: true
    fast-open: true
    up: "50 Mbps"
    down: "900 Mbps"

# ==================== 策略组 ====================
proxy-groups:

  - name: "🚀 自动选择"
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true
    timeout: 3000

    proxies:
      - "🏠 自建 绿云日本 (Hy2)"
      - "🏠 自建 绿云日本-CF优选"
      - "🏠 自建 RN美西 (Hy2)"
      - "🇯🇵 IIJ Japan"

  - name: "🎥 奈飞分流"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🏠 自建 RN美西 (Hy2)"
      - "🏠 自建 绿云日本-CF优选"
      - "🏠 自建 绿云日本 (Hy2)"
      - "🇯🇵 IIJ Japan"

  - name: "🏰 迪士尼分流"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🏠 自建 绿云日本-CF优选"
      - "🏠 自建 RN美西 (Hy2)"
      - "🏠 自建 绿云日本 (Hy2)"
      - "🇯🇵 IIJ Japan"

# ==================== 规则 ====================
rules:

  # Netflix
  - DOMAIN-KEYWORD,netflix,🎥 奈飞分流
  - DOMAIN-SUFFIX,netflix.com,🎥 奈飞分流
  - DOMAIN-SUFFIX,netflix.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxext.com,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxso.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflximg.net,🎥 奈飞分流
  - DOMAIN-SUFFIX,nflxvideo.net,🎥 奈飞分流

  # Disney+
  - DOMAIN-SUFFIX,disneyplus.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disney-plus.net,🏰 迪士尼分流
  - DOMAIN-SUFFIX,disneystreaming.com,🏰 迪士尼分流
  - DOMAIN-SUFFIX,dssott.com,🏰 迪士尼分流

  # YouTube
  - DOMAIN-SUFFIX,googlevideo.com,🚀 自动选择
  - DOMAIN-SUFFIX,youtube.com,🚀 自动选择
  - DOMAIN-SUFFIX,ytimg.com,🚀 自动选择

  # AI
  - DOMAIN-SUFFIX,openai.com,🚀 自动选择
  - DOMAIN-SUFFIX,chatgpt.com,🚀 自动选择
  - DOMAIN-SUFFIX,anthropic.com,🚀 自动选择

  # 国内直连
  - GEOIP,CN,DIRECT

  # 默认
  - MATCH,🚀 自动选择
